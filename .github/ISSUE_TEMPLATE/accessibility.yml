name: Accessibility Issue
description: Report an accessibility barrier on the AKMLEVA platform
title: "[a11y] "
labels: [a11y]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report an accessibility issue. This information helps us prioritise and fix barriers quickly.

  - type: input
    id: url
    attributes:
      label: Page URL
      description: The exact URL where the issue occurs.
      placeholder: e.g. https://www.akmleva.com/destinations/paris
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this block you?
      options:
        - Critical – completely blocked from using the page / feature
        - Serious – can use the page but with significant difficulty
        - Moderate – can use the page but some functionality is inconvenient
        - Minor – cosmetic or very low-impact issue
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen instead?
      placeholder: e.g. "The search button does not receive focus when tabbing through the hero section."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to the page URL above
        2. Press Tab 4 times
        3. The search button is skipped
      validations:
        required: true

  - type: input
    id: assistive_tech
    attributes:
      label: Assistive Technology
      description: What assistive technology were you using (including version)?
      placeholder: e.g. NVDA 2024.1, VoiceOver (macOS 15), ZoomText, Dragon NaturallySpeaking
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, macOS 15.2, Android 14, iOS 18.1
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (with version)
      placeholder: e.g. Chrome 125, Firefox 128, Safari 18.1
    validations:
      required: true

  - type: dropdown
    id: wcag_criteria
    attributes:
      label: Related WCAG Criterion (if known)
      description: Optional — helps us identify the success criterion involved.
      options:
        - 1.1.1 Non-text Content
        - 1.3.1 Info and Relationships
        - 1.4.1 Use of Color
        - 1.4.3 Contrast (Minimum)
        - 2.1.1 Keyboard
        - 2.4.3 Focus Order
        - 2.4.7 Focus Visible
        - 2.4.4 Link Purpose (In Context)
        - 3.3.1 Error Identification
        - 3.3.2 Labels or Instructions
        - 4.1.2 Name, Role, Value
        - 4.1.3 Status Messages
        - Other / Not sure

  - type: textarea
    id: workaround
    attributes:
      label: Workaround (if any)
      description: Have you found any way to work around this issue?
      placeholder: e.g. "I can still access the search by pressing Enter when the input is focused."

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have checked that this issue has not already been reported
          required: true
        - label: I understand that I will receive a follow-up within 5 business days
          required: true
