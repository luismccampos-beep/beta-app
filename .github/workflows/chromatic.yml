name: Chromatic
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.storybook/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'next.config.*'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.storybook/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'next.config.*'
  workflow_dispatch:

jobs:
  chromatic:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Chromatic token is set
        run: |
          if [ -z "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "::error::CHROMATIC_PROJECT_TOKEN secret is missing or empty"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: 'storybook:build'
          exitZeroOnChanges: true
          exitOnceUploaded: true
          onlyChanged: true
          failOnUploadError: true
          externals: 'public/**'
