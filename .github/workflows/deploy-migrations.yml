name: Deploy & Migrate
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

# GitHub Actions injects "" (empty string) when a secret is missing — it does NOT
# unset it. That empty value used to be set at the job-level env block without
# fallback, which broke `prisma generate` and any other step that inherited it
# (P1012: "DATABASE_URL_UNPOOLED resolved to an empty string"). The fallback below
# is applied at the job level so EVERY step (npm install's postinstall, generate,
# migrate deploy) inherits a non-empty value. A "Validate database env vars" step
# below fails fast if even DATABASE_URL is missing.
env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Run tests
        run: npx vitest run --passWithNoTests

  migrate:
    name: Apply Prisma Migrations
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Validate database env vars
        # MUST run BEFORE `npm ci`: postinstall triggers `prisma generate`,
        # which validates the schema and would die with P1012 before a later guard.
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL is empty. Configure at least DATABASE_URL in repo Settings → Secrets and variables → Actions (and ideally DATABASE_URL_UNPOOLED for Neon)."
            exit 1
          fi
          echo "DATABASE_URL length: ${#DATABASE_URL}"
          if [ -z "${DATABASE_URL_UNPOOLED:-}" ]; then
            echo "::warning::DATABASE_URL_UNPOOLED empty — 'migrate status' and 'migrate deploy' will use the pooled URL, which fails on advisory locks. Add DATABASE_URL_UNPOOLED to GitHub secrets using the Neon direct (non-pooler) URL."
          elif echo "$DATABASE_URL_UNPOOLED" | grep -q "\-pooler\."; then
            echo "::error::DATABASE_URL_UNPOOLED contains '-pooler.' in the hostname. It must be the DIRECT Neon URL (without -pooler). Update the secret in GitHub Settings → Secrets and variables → Actions."
            exit 1
          fi

      - run: npm ci

      - name: Install PostgreSQL client
        # The resolve-failed-migrations.mjs script uses psql to query
        # _prisma_migrations directly. ubuntu-latest does not ship with psql
        # pre-installed.
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Resolve failed migrations
        # Auto-detect and resolve failed Prisma migrations (P3009) so they don't
        # block subsequent `migrate deploy` calls. The script queries
        # _prisma_migrations for failed entries via psql, checks if the SQL
        # objects exist in the database, and runs
        # `prisma migrate resolve --applied|--rolled-back` accordingly.
        run: node scripts/resolve-failed-migrations.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED || secrets.DATABASE_URL }}

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Notify Discord - Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "DISCORD_WEBHOOK_URL not set, skipping"; exit 0; fi
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Migrations Applied",
                "description": "Prisma migrations deployed successfully to `${{ github.ref_name }}`.",
                "color": 5763719,
                "fields": [
                  { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Commit", "value": "[`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})", "inline": true }
                ]
              }]
            }'

      - name: Notify Discord - Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "DISCORD_WEBHOOK_URL not set, skipping"; exit 0; fi
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Migration Failed",
                "description": "Prisma migrations failed on `${{ github.ref_name }}`.\n\n[View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                "color": 15548997,
                "fields": [
                  { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
                  { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
                  { "name": "Commit", "value": "[`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})", "inline": true }
                ]
              }]
            }'

  deploy:
    name: Deploy to Vercel
    if: github.event_name == 'push'
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}