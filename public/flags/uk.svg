<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
  <!-- Blue background -->
  <rect width="640" height="480" fill="#012169"/>
  
  <!-- White diagonals (St. Patrick's and St. Andrew's saltires - white underlayer) -->
  <path d="M0 0 L640 480 M640 0 L0 480" stroke="#FFFFFF" stroke-width="80"/>
  
  <!-- Red diagonals (St. Patrick's saltire - offset) -->
  <path d="M0 0 L640 480" stroke="#C8102E" stroke-width="48"/>
  <path d="M640 0 L0 480" stroke="#C8102E" stroke-width="48"/>
  
  <!-- White cross (St. George's Cross - white underlayer) -->
  <path d="M320 0 v480 M0 240 h640" stroke="#FFFFFF" stroke-width="160"/>
  
  <!-- Red cross (St. George's Cross) -->
  <path d="M320 0 v480 M0 240 h640" stroke="#C8102E" stroke-width="96"/>
</svg>