<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
  <!-- Top red stripe (1/4 height) -->
  <rect x="0" y="0" width="640" height="120" fill="#AA151B"/>
  <!-- Middle yellow stripe (1/2 height) -->
  <rect x="0" y="120" width="640" height="240" fill="#F1BF00"/>
  <!-- Bottom red stripe (1/4 height) -->
  <rect x="0" y="360" width="640" height="120" fill="#AA151B"/>
  
  <!-- Spanish coat of arms -->
  <g transform="translate(213 240)">
    <!-- Left Pillar of Hercules -->
    <g transform="translate(-70, 0)">
      <rect x="-8" y="-70" width="16" height="140" fill="#C8B59D" stroke="#8B7355" stroke-width="1.5"/>
      <rect x="-10" y="-75" width="20" height="8" fill="#8B7355"/>
      <rect x="-10" y="67" width="20" height="8" fill="#8B7355"/>
      <!-- Red banner with PLUS -->
      <path d="M8,-40 Q25,-38 28,-20 Q25,-2 8,0" fill="#AA151B" stroke="#000" stroke-width="0.8"/>
      <text x="18" y="-15" font-family="serif" font-size="10" font-weight="bold" fill="#F1BF00" text-anchor="middle">P</text>
      <text x="18" y="-5" font-family="serif" font-size="10" font-weight="bold" fill="#F1BF00" text-anchor="middle">L</text>
      <text x="18" y="5" font-family="serif" font-size="10" font-weight="bold" fill="#F1BF00" text-anchor="middle">U</text>
      <text x="18" y="15" font-family="serif" font-size="10" font-weight="bold" fill="#F1BF00" text-anchor="middle">S</text>
    </g>
    
    <!-- Right Pillar of Hercules -->
    <g transform="translate(70, 0)">
      <rect x="-8" y="-70" width="16" height="140" fill="#C8B59D" stroke="#8B7355" stroke-width="1.5"/>
      <rect x="-10" y="-75" width="20" height="8" fill="#8B7355"/>
      <rect x="-10" y="67" width="20" height="8" fill="#8B7355"/>
      <!-- Red banner with ULTRA -->
      <path d="M-8,-40 Q-25,-38 -28,-20 Q-25,-2 -8,0" fill="#AA151B" stroke="#000" stroke-width="0.8"/>
      <text x="-18" y="-28" font-family="serif" font-size="9" font-weight="bold" fill="#F1BF00" text-anchor="middle">U</text>
      <text x="-18" y="-19" font-family="serif" font-size="9" font-weight="bold" fill="#F1BF00" text-anchor="middle">L</text>
      <text x="-18" y="-10" font-family="serif" font-size="9" font-weight="bold" fill="#F1BF00" text-anchor="middle">T</text>
      <text x="-18" y="-1" font-family="serif" font-size="9" font-weight="bold" fill="#F1BF00" text-anchor="middle">R</text>
      <text x="-18" y="8" font-family="serif" font-size="9" font-weight="bold" fill="#F1BF00" text-anchor="middle">A</text>
    </g>
    
    <!-- Main shield outline -->
    <path d="M-50,-65 L50,-65 L50,45 Q50,60 35,70 L0,85 L-35,70 Q-50,60 -50,45 Z" 
          fill="#AA151B" stroke="#000" stroke-width="2.5"/>
    
    <!-- Quartered shield sections -->
    <!-- Top-left: Castle of Castile -->
    <g>
      <rect x="-48" y="-63" width="46" height="52" fill="#AA151B"/>
      <g transform="translate(-25, -37)">
        <rect x="-10" y="0" width="20" height="24" fill="#F1BF00" stroke="#8B6914" stroke-width="1"/>
        <rect x="-12" y="-4" width="5" height="4" fill="#F1BF00" stroke="#8B6914" stroke-width="0.8"/>
        <rect x="-4" y="-4" width="8" height="4" fill="#F1BF00" stroke="#8B6914" stroke-width="0.8"/>
        <rect x="4" y="-4" width="5" height="4" fill="#F1BF00" stroke="#8B6914" stroke-width="0.8"/>
        <rect x="-3" y="10" width="6" height="14" fill="#4A4A4A"/>
        <line x1="-10" y1="8" x2="10" y2="8" stroke="#8B6914" stroke-width="1"/>
        <line x1="-10" y1="16" x2="10" y2="16" stroke="#8B6914" stroke-width="1"/>
      </g>
    </g>
    
    <!-- Top-right: Lion of León -->
    <g>
      <rect x="2" y="-63" width="46" height="52" fill="#FFFFFF"/>
      <g transform="translate(25, -37)">
        <path d="M-8,20 L-8,10 Q-8,5 -5,2 L0,-2 L5,2 Q8,5 8,10 L8,20 Q8,22 6,24 L0,26 L-6,24 Q-8,22 -8,20 Z" 
              fill="#9B30FF" stroke="#4B0082" stroke-width="1"/>
        <circle cx="0" cy="5" r="6" fill="#9B30FF" stroke="#4B0082" stroke-width="1"/>
        <path d="M-3,3 Q-2,1 0,1 Q2,1 3,3" fill="none" stroke="#4B0082" stroke-width="0.8"/>
        <circle cx="-2" cy="5" r="1" fill="#000"/>
        <circle cx="2" cy="5" r="1" fill="#000"/>
        <path d="M-10,18 L-8,20 L-10,22 M10,18 L8,20 L10,22" fill="none" stroke="#9B30FF" stroke-width="2" stroke-linecap="round"/>
        <path d="M0,25 L-2,28 L0,26 L2,28 Z" fill="#9B30FF" stroke="#4B0082" stroke-width="0.8"/>
        <circle cx="0" cy="-3" r="3" fill="#FFD700" stroke="#8B6914" stroke-width="0.8"/>
      </g>
    </g>
    
    <!-- Bottom-left: Vertical red and yellow stripes (Aragon) -->
    <g>
      <rect x="-48" y="-9" width="46" height="52" fill="#F1BF00"/>
      <rect x="-48" y="-9" width="11.5" height="52" fill="#AA151B"/>
      <rect x="-25" y="-9" width="11.5" height="52" fill="#AA151B"/>
      <rect x="-2" y="-9" width="11.5" height="52" fill="#AA151B"/>
      <rect x="21" y="-9" width="11.5" height="52" fill="#AA151B"/>
    </g>
    
    <!-- Bottom-right: Chains of Navarre -->
    <g>
      <rect x="2" y="-9" width="46" height="52" fill="#AA151B"/>
      <g transform="translate(25, 17)" stroke="#F1BF00" stroke-width="2.5" fill="none">
        <circle cx="0" cy="0" r="8"/>
        <line x1="-8" y1="-8" x2="-14" y2="-14"/>
        <line x1="8" y1="-8" x2="14" y2="-14"/>
        <line x1="-8" y1="8" x2="-14" y2="14"/>
        <line x1="8" y1="8" x2="14" y2="14"/>
        <circle cx="-14" cy="-14" r="4"/>
        <circle cx="14" cy="-14" r="4"/>
        <circle cx="-14" cy="14" r="4"/>
        <circle cx="14" cy="14" r="4"/>
        <line x1="0" y1="-8" x2="0" y2="-18"/>
        <circle cx="0" cy="-18" r="4"/>
        <circle cx="0" cy="0" r="3" fill="#00A859"/>
      </g>
    </g>
    
    <!-- Center: Granada pomegranate (inescutcheon) -->
    <g transform="translate(0, 17)">
      <path d="M-10,-8 Q-12,-10 -10,-12 L10,-12 Q12,-10 10,-8 L10,6 Q10,10 6,12 L0,14 L-6,12 Q-10,10 -10,6 Z" 
            fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="6" fill="#AA151B"/>
      <path d="M-3,-6 L0,-9 L3,-6 M-5,-6 L-5,-8 M5,-6 L5,-8 M0,-6 L0,-9" stroke="#228B22" stroke-width="1.2" fill="none"/>
      <circle cx="-2" cy="-1" r="1" fill="#FFD700"/>
      <circle cx="2" cy="-1" r="1" fill="#FFD700"/>
      <circle cx="0" cy="2" r="1" fill="#FFD700"/>
    </g>
    
    <!-- Royal Crown -->
    <g transform="translate(0, -65)">
      <!-- Crown base -->
      <ellipse cx="0" cy="0" rx="52" ry="8" fill="#FFD700" stroke="#8B6914" stroke-width="1.5"/>
      <rect x="-52" y="-8" width="104" height="8" fill="#AA151B"/>
      <ellipse cx="0" cy="-8" rx="52" ry="8" fill="#AA151B" stroke="#8B6914" stroke-width="1.5"/>
      
      <!-- Crown arches -->
      <path d="M-40,-8 Q-20,-35 0,-40 Q20,-35 40,-8" fill="none" stroke="#FFD700" stroke-width="3"/>
      <path d="M-40,-8 Q0,-35 40,-8" fill="none" stroke="#FFD700" stroke-width="3"/>
      
      <!-- Crown points (5 visible) -->
      <g fill="#FFD700" stroke="#8B6914" stroke-width="1">
        <path d="M-45,-8 L-48,-22 L-42,-22 Z"/>
        <circle cx="-45" cy="-24" r="3" fill="#AA151B"/>
        
        <path d="M-22,-8 L-25,-26 L-19,-26 Z"/>
        <circle cx="-22" cy="-28" r="3" fill="#AA151B"/>
        
        <path d="M0,-8 L-3,-28 L3,-28 Z"/>
        <circle cx="0" cy="-30" r="3" fill="#AA151B"/>
        
        <path d="M22,-8 L19,-26 L25,-26 Z"/>
        <circle cx="22" cy="-28" r="3" fill="#AA151B"/>
        
        <path d="M45,-8 L42,-22 L48,-22 Z"/>
        <circle cx="45" cy="-24" r="3" fill="#AA151B"/>
      </g>
      
      <!-- Top orb -->
      <circle cx="0" cy="-40" r="6" fill="#4169E1" stroke="#000" stroke-width="1"/>
      <path d="M0,-46 L0,-40 M-6,-40 L6,-40 M-4,-43 Q0,-44 4,-43" fill="none" stroke="#FFD700" stroke-width="1.2"/>
      <circle cx="0" cy="-48" r="2" fill="#FFD700" stroke="#8B6914" stroke-width="0.8"/>
    </g>
  </g>
</svg>