<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKMLEVA — Sem ligação</title>
    <style>
        :root {
            --background: #020617; /* Navy mais profundo */
            --foreground: #ffffff;
            --primary: #2563eb;
            --cyan: #22d3ee;
            --purple: #818cf8;
            --muted: #94a3b8;
            --card: rgba(15, 23, 42, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Moving Grid Background */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
            animation: moveGrid 20s linear infinite;
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            z-index: 1;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 32px 32px; }
        }

        /* Ambient Glows */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, transparent 70%);
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            padding: 3rem 2rem;
            max-width: 440px;
            z-index: 10;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-wrapper {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        /* Radar Effect */
        .icon-wrapper::after {
            content: '';
            position: absolute;
            inset: -20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: radar 3s ease-out infinite;
        }

        @keyframes radar {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .icon-svg {
            width: 96px;
            height: 96px;
            fill: url(#brand-gradient);
            filter: drop-shadow(0 0 20px rgba(37, 99, 235, 0.4));
            animation: float 5s ease-in-out infinite;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-size: 1rem;
        }

        .btn {
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: #fff;
            color: #000;
            padding: 1rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            border: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            transform: scale(1.02);
            background: var(--foreground);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            color: var(--muted);
            margin-top: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #f43f5e;
            background: rgba(244, 63, 94, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow"></div>

    <main class="container">
        <div class="status-badge">
            <span class="pulse-dot"></span> Offline
        </div>

        <div class="icon-wrapper">
            <svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--cyan);stop-opacity:1" />
                        <stop offset="50%" style="stop-color:var(--primary);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--purple);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M18.18 8.12c-1.3 0-2.45.6-3.3 1.54l-2.88 3.32-2.88-3.32c-.85-.94-2-1.54-3.3-1.54a4.88 4.88 0 0 0-4.88 4.88c0 2.7 2.19 4.88 4.88 4.88 1.3 0 2.45-.6 3.3-1.54l2.88-3.32 2.88 3.32c.85.94 2 1.54 3.3 1.54a4.88 4.88 0 0 0 4.88-4.88c0-2.7-2.19-4.88-4.88-4.88zm-13.3 8.26c-1.87 0-3.38-1.51-3.38-3.38s1.51-3.38 3.38-3.38c.95 0 1.8.4 2.4 1.05l2.48 2.85-2.48 2.85c-.6.65-1.45 1.05-2.4 1.05zm13.3 0c-.95 0-1.8-.4-2.4-1.05l-2.48-2.85 2.48-2.85c.6-.65 1.45-1.05 2.4-1.05 1.87 0 3.38 1.51 3.38 3.38s-1.51 3.38-3.38 3.38z" />
            </svg>
        </div>

        <h1>A ligação falhou</h1>
        <p>Verifique o seu Wi-Fi ou dados móveis. O AKMLEVA vai ligar-se automaticamente assim que o sinal regressar.</p>

        <button onclick="handleReload()" class="btn" id="reload-btn">
            Tentar Recarregar
        </button>

        <button onclick="window.history.back()" class="btn-secondary">
            Voltar à página anterior
        </button>
    </main>

    <script>
        const btn = document.getElementById('reload-btn');

        function handleReload() {
            if (!navigator.onLine) {
                btn.textContent = "Ainda sem sinal...";
                btn.style.opacity = "0.7";
                setTimeout(() => {
                    btn.textContent = "Tentar Recarregar";
                    btn.style.opacity = "1";
                }, 2000);
            } else {
                window.location.reload();
            }
        }

        // Reconexão automática
        window.addEventListener('online', () => {
            btn.textContent = "Sinal recuperado! A carregar...";
            btn.style.background = "var(--cyan)";
            btn.style.color = "#000";
            setTimeout(() => {
                window.location.reload();
            }, 800);
        });
    </script>
</body>

</html>
