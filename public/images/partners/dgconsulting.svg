<svg width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <title>dg consulting (vetor aproximado)</title>
  <desc>Recriação em SVG do logotipo “dg consulting” com letras “d” e “g” em azul e a palavra “consulting” em azul escuro.</desc>

  <!-- Fundo branco (remova se quiser transparente) -->
  <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>

  <!-- Logo -->
  <g transform="translate(30 165) scale(0.85)">
    <!-- Ícone "dg" em traço grosso (monoline), aproximando a arte original -->
    <g fill="none" stroke="#16B8EA" stroke-width="70" stroke-linecap="round" stroke-linejoin="round">
      <!-- d -->
      <path d="
        M 70 10 L 70 255
        M 290 160
        A 95 95 0 1 1 100 160
        A 95 95 0 1 1 290 160
      "/>

      <!-- g -->
      <path d="
        M 515 160
        A 95 95 0 1 1 325 160
        A 95 95 0 1 1 515 160
        M 515 95 L 515 265
        C 515 325 470 355 420 355
        C 340 355 310 305 350 270
        M 480 70 L 520 35
      "/>
    </g>

    <!-- Texto "consulting" -->
    <text x="530" y="215"
          fill="#0E3A46"
          font-family="Arial, Helvetica, sans-serif"
          font-size="67"
          font-weight="700"
          letter-spacing="0.5">
      consulting
    </text>
  </g>
</svg>