<svg width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="white" />

  <!-- Logo Icon: Three Hexagons -->
  <g transform="translate(400, 260)" fill="#BB1E25">
    <defs>
      <!-- Define a single flat-topped hexagon path -->
      <!-- side length s=60, width=120, height=104 -->
      <path id="hexagon" d="M -30 -52 L 30 -52 L 60 0 L 30 52 L -30 52 L -60 0 Z" />
    </defs>
    
    <!-- Top Left Hexagon -->
    <use href="#hexagon" x="-66" y="-60" />
    
    <!-- Top Right Hexagon -->
    <use href="#hexagon" x="66" y="-60" />
    
    <!-- Bottom Hexagon -->
    <use href="#hexagon" x="0" y="55" />
  </g>

  <!-- Logo Text: SANJOTEC -->
  <g font-family="Arial, sans-serif" font-weight="bold" font-size="94" text-anchor="middle" letter-spacing="-2">
    <text x="400" y="475">
      <tspan fill="#8C8C8C">SANJO</tspan><tspan fill="#BB1E25">TEC</tspan>
    </text>
  </g>
</svg>



