<svg width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="800" height="600" fill="white" />

  <!-- Logo Group Centered -->
  <g transform="translate(150, 220)">
    
    <!-- Text Section -->
    <g transform="translate(0, 50)">
      <text x="280" y="0" font-family="'Arial', sans-serif" font-size="38" fill="black" text-anchor="end">TURISMO DE</text>
      <text x="280" y="45" font-family="'Arial', sans-serif" font-size="52" font-weight="900" fill="black" text-anchor="end">PORTUGAL</text>
    </g>

    <!-- Graphic Icon Section -->
    <g transform="translate(300, 0) scale(1.1)">
      
      <!-- Sun/Head (Yellow) -->
      <circle cx="50" cy="20" r="14" fill="#FFB612" />

      <!-- Left Body (Green) -->
      <!-- Abstract jagged shape representing the left figure -->
      <path fill="#009640" d="
        M 43,85 
        L 10,85 
        Q 5,85 5,75 
        L 8,65 
        L 2,50 
        L 5,30 
        L 0,20 
        Q 5,15 15,20 
        L 25,15 
        L 30,22 
        L 38,18 
        Q 42,30 38,45 
        Q 35,60 43,85 
        Z" />

      <!-- Right Body (Red) -->
      <!-- Abstract jagged shape representing the right figure -->
      <path fill="#E30613" d="
        M 57,85 
        L 90,85 
        Q 95,85 95,75 
        L 92,65 
        L 98,50 
        L 95,30 
        L 100,20 
        Q 95,15 85,20 
        L 75,15 
        L 70,22 
        L 62,18 
        Q 58,30 62,45 
        Q 65,60 57,85 
        Z" />

      <!-- Bottom Waves (Blue) -->
      <!-- Stylized spiral waves -->
      <g fill="none" stroke="#005CAB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <!-- Wave 1 -->
        <path d="M 10,95 C 5,95 0,105 10,105 C 18,105 20,95 15,90 C 12,87 8,92 12,98 C 15,102 25,102 28,98" />
        <!-- Wave 2 -->
        <path d="M 35,98 C 30,98 25,108 35,108 C 43,108 45,98 40,93 C 37,90 33,95 37,101 C 40,105 50,105 53,101" transform="translate(0, -3)" />
        <!-- Wave 3 -->
        <path d="M 60,98 C 55,98 50,108 60,108 C 68,108 70,98 65,93 C 62,90 58,95 62,101 C 65,105 75,105 78,101" transform="translate(0, -3)" />
         <!-- Connecting strokes approximated for style -->
         <path d="M 28,98 Q 32,95 35,95" />
         <path d="M 53,98 Q 57,95 60,95" />
      </g>
    </g>
  </g>
</svg>