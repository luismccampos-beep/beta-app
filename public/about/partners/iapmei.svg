<svg width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Gradient for the metallic blue rings -->
    <linearGradient id="metalBlue" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#9fcbf5" /> <!-- Light highlight -->
      <stop offset="30%" stop-color="#4d8ac9" />
      <stop offset="50%" stop-color="#ffffff" /> <!-- Specular shine -->
      <stop offset="55%" stop-color="#4d8ac9" />
      <stop offset="100%" stop-color="#18345e" /> <!-- Shadow -->
    </linearGradient>

    <!-- Gradient for the inner ring to differentiate depth -->
    <linearGradient id="metalBlueInner" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#18345e" />
      <stop offset="40%" stop-color="#6ea4d9" />
      <stop offset="60%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#4d8ac9" />
    </linearGradient>

    <!-- Drop shadow for 3D depth feeling -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="white" />

  <!-- Logo Group -->
  <g transform="translate(100, 150)">
    
    <!-- 1. The Graphical Icon (Globe/Rings) -->
    <g transform="translate(150, 150) scale(1.4)">
      <!-- Outer Ring -->
      <circle cx="0" cy="0" r="65" fill="none" stroke="url(#metalBlue)" stroke-width="14" filter="url(#softShadow)" />
      
      <!-- Inner Tilted Ring -->
      <!-- Modeled as an ellipse rotated to simulate the 3D gyroscope look -->
      <ellipse cx="0" cy="0" rx="50" ry="25" fill="none" stroke="url(#metalBlueInner)" stroke-width="12" transform="rotate(-45)" filter="url(#softShadow)" />
      
      <!-- Highlights to enhance the 3D glossy plastic/metal effect -->
      <path d="M -45 -45 A 65 65 0 0 1 0 -65" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6" />
      <path d="M -20 -10 A 50 25 -45 0 1 10 -20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="rotate(-45)" />
    </g>

    <!-- 2. The Text -->
    <g transform="translate(280, 105)">
      <!-- Main Title: IAPMEI -->
      <!-- Using a geometric sans-serif construction to mimic the rounded/bold style -->
      <text x="0" y="80" font-family="'Arial Rounded MT Bold', Arial, sans-serif" font-weight="900" font-size="110" fill="black" letter-spacing="2">
        IAPMEI
      </text>

      <!-- Tagline: Parcerias para o Crescimento -->
      <text x="5" y="130" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#1a1a1a">
        Parcerias para o Crescimento
      </text>
    </g>
  </g>
</svg>